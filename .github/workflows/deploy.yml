name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            cd /root/story-ecom
            git pull origin main
            cd backend && npm install --production && npx prisma generate
            cd ../storyuser && npm install && npm run build
            cd ../story-luxury-admin && npm install && npm run build
            pm2 restart story-backend || pm2 start backend/src/index.js --name story-backend
            echo "Deployed successfully!"
